<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>幻想ステージ[Phantasm Star]</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'MS Gothic', 'MS PGothic', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #pause-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
                        display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        .menu-active { border: 2px solid #fff; padding: 10px 40px; background: rgba(255,255,255,0.2); font-size: 24px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="ui">
    <div id="lives" style="font-size: 28px; color: #ffbbee;"></div>
    <div id="bombs" style="font-size: 18px; color: #7f7;">BOMBS: ★★★ (Used: 0)</div>
    <div id="boss-info" style="margin-top: 10px;">
        <div id="spell-name" style="font-size: 20px; color: #aaf;">Stage 1: Entrance</div>
        <div style="width: 300px; height: 10px; border: 1px solid #fff; background: rgba(0,0,0,0.5);">
            <div id="hp-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #ff0);"></div>
        </div>
    </div>
</div>

<div id="pause-screen">
    <h1>PAUSE</h1>
    <div class="menu-active">RESUME [Z or ENTER]</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/** * ZUN調リアルタイムオーディオエンジン
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playZunNote(freq, type, dur, vol, sweep = 0) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if(sweep) osc.frequency.exponentialRampToValueAtTime(sweep, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

// BGMシーケンサー
function updateBGM(f, s, p) {
    if(f % 15 === 0) {
        const scales = [
            [261, 311, 349, 392, 466], // 1面通常 (哀愁)
            [329, 392, 440, 523, 587], // スペル1-2
            [440, 523, 587, 659, 783], // スペル3 (激しい)
            [196, 233, 261, 311, 349]  // Phantasm (不気味)
        ];
        const scale = scales[s === 2 ? 3 : p];
        const note = scale[Math.floor(Math.random() * scale.length)];
        playZunNote(note, 'square', 0.4, 0.02); // 独特のトランペット風
        if(f % 60 === 0) playZunNote(note/2, 'sawtooth', 1.2, 0.03); // ベース
    }
}

/**
 * ゲーム基本設定
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

let frame = 0, isPaused = false, stage = 1, phase = 0; // phase 0:通常, 1-3:スペル
let lives = 3, bombs = 3, bombsUsedCount = 0, deathCount = 0;
let bombActiveTimer = 0;

const player = { x: W/2, y: H-100, r: 2, speed: 5 };
const boss = { x: W/2, y: -100, targetY: 150, hp: 2000, maxHp: 2000, active: true };
const stars = Array.from({length: 100}, () => ({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*15 + 10 }));

let bullets = [], enemyBullets = [], enemies = [], items = [];
const spellNames = ["「星符 - 天の川の激流」", "「幻符 - 夜空の境界」", "「極光 - フィナリス」"];

/**
 * コントロール
 */
const keys = {};
window.onkeydown = (e) => { 
    keys[e.key.toLowerCase()] = true; 
    if(e.key === 'Escape') togglePause();
    if(isPaused && (e.key === 'z' || e.key === 'Enter')) togglePause();
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
}

/**
 * メインループ
 */
function loop() {
    if (isPaused) return requestAnimationFrame(loop);

    // 背景星空 (高速移動)
    stars.forEach(s => { s.y += s.s; if(s.y > H) s.y = -10; });

    // 自機移動
    if(keys['arrowup'] && player.y > 20) player.y -= player.speed;
    if(keys['arrowdown'] && player.y < H-20) player.y += player.speed;
    if(keys['arrowleft'] && player.x > 20) player.x -= player.speed;
    if(keys['arrowright'] && player.x < W-20) player.x += player.speed;

    // 自機ショット
    if(keys['z'] && frame % 4 === 0) {
        bullets.push({x: player.x - 8, y: player.y - 15, vy: -18});
        bullets.push({x: player.x + 8, y: player.y - 15, vy: -18});
        playZunNote(880, 'sine', 0.1, 0.02, 440);
    }

    // ボム (Xキー)
    if(keys['x'] && bombs > 0 && bombActiveTimer === 0) {
        bombs--; bombsUsedCount++;
        bombActiveTimer = 180; // 約3秒
        document.getElementById('bombs').innerText = `BOMBS: ${"★".repeat(bombs)} (Used: ${bombsUsedCount})`;
        playZunNote(110, 'square', 1.0, 0.06, 55);
    }

    if(bombActiveTimer > 0) {
        bombActiveTimer--;
        boss.hp -= 12; // ボム中の自動継続ダメージ
        enemyBullets = []; // 弾を消去
    }

    // ボス管理
    if(boss.active) {
        boss.y += (boss.targetY - boss.y) * 0.05;
        spawnDanmaku();
        if(boss.hp <= 0) nextPhase();
    }

    // 雑魚敵出現 (波状移動)
    if(frame % 60 === 0) {
        enemies.push({ x: Math.random()*W, y: -50, t: Math.random()*Math.PI*2 });
    }

    updateEntities();
    checkCollisions();
    updateBGM(frame, stage, phase);
    draw();
    frame++;
    requestAnimationFrame(loop);
}

function spawnDanmaku() {
    let diff = stage === 2 ? 5.0 : (phase === 0 ? 0.3 : 0.8 + phase * 0.4);
    
    // 全方位弾幕
    if(frame % Math.max(2, Math.floor(15 / diff)) === 0) {
        let count = 6 + Math.floor(diff * 6);
        for(let i=0; i<count; i++) {
            let angle = (i * Math.PI * 2 / count) + (frame * 0.02);
            enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4, r: 6, c: '#f0f'});
        }
    }
    // 自機狙い弾 (頻度多め)
    if(frame % Math.max(10, Math.floor(40 / diff)) === 0) {
        let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
        enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle)*7, vy: Math.sin(angle)*7, r: 8, c: '#0ff'});
    }
}

function updateEntities() {
    bullets.forEach((b, i) => { b.y += b.vy; if(b.y < -20) bullets.splice(i, 1); });
    enemyBullets.forEach((b, i) => { 
        b.x += b.vx; b.y += b.vy; 
        if(b.y > H+20 || b.x < -20 || b.x > W+20) enemyBullets.splice(i, 1); 
    });
    enemies.forEach((e, i) => {
        e.y += 3; e.t += 0.05; e.x += Math.sin(e.t) * 15; // 波状移動
        if(frame % 30 === 0) { // 雑魚の弾幕 (多め)
            enemyBullets.push({x: e.x, y: e.y, vx: 0, vy: 6, r: 4, c: '#ff0'});
        }
        if(e.y > H) enemies.splice(i, 1);
    });
    items.forEach((it, i) => { it.y += 2; if(it.y > H) items.splice(i, 1); });
}

function checkCollisions() {
    if(bombActiveTimer > 0) return;

    // 自機当たり判定
    enemyBullets.forEach(b => {
        if(Math.hypot(player.x - b.x, player.y - b.y) < player.r + b.r) playerDie();
    });
    enemies.forEach(e => {
        if(Math.hypot(player.x - e.x, player.y - e.y) < 20) playerDie();
    });

    // 攻撃判定
    bullets.forEach((b, i) => {
        if(boss.active && Math.hypot(boss.x - b.x, boss.y - b.y) < 40) {
            boss.hp -= 25; bullets.splice(i, 1);
        }
        enemies.forEach((e, ei) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < 30) {
                playZunNote(440, 'sine', 0.05, 0.01);
                items.push({x: e.x, y: e.y});
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
            }
        });
    });

    // 残機回復
    items.forEach((it, i) => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 40) {
            lives++; updateLivesUI(); items.splice(i, 1);
            playZunNote(1320, 'sine', 0.2, 0.05);
        }
    });
}

function playerDie() {
    lives--; deathCount++;
    playZunNote(110, 'sawtooth', 0.4, 0.1); // 被弾音
    player.x = W/2; player.y = H-100;
    enemyBullets = [];
    updateLivesUI();
    if(lives <= 0) { alert("Game Over..."); location.reload(); }
}

function nextPhase() {
    phase++;
    if(stage === 1) {
        if(phase <= 3) {
            boss.hp = boss.maxHp = 2000 + phase * 1000;
            document.getElementById('spell-name').innerText = spellNames[phase-1];
            enemyBullets = [];
            playZunNote(660, 'square', 0.5, 0.05, 1320); // 移行音
        } else {
            // ステージ1終了時の判定
            if(bombsUsedCount === 0 && deathCount === 0) {
                stage = 2; phase = 0;
                boss.hp = boss.maxHp = 25000;
                document.getElementById('spell-name').innerText = "STAGE PHANTASM: 「虚空の審判」";
                document.getElementById('spell-name').style.color = "#ff5555";
                alert("ノーミス・ノーボムクリア！ PHANTASM STAGEへ進みます。");
            } else {
                alert("Stage 1 Clear! (PHANTASMへはノーミス・ノーボムが必要です)");
                location.reload();
            }
        }
    } else {
        alert("Phantasm Clear!! あなたこそが真の弾幕マスターです。");
        location.reload();
    }
}

function updateLivesUI() {
    document.getElementById('lives').innerHTML = "★".repeat(lives);
}

function draw() {
    ctx.fillStyle = (stage === 2) ? '#200' : '#000';
    ctx.fillRect(0, 0, W, H);

    // 背景
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    stars.forEach(s => ctx.fillRect(s.x, s.y, 2, s.s / 2));

    // 自機
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

    // ボス
    if(boss.active) {
        ctx.fillStyle = (stage === 2) ? '#f0f' : '#fff';
        ctx.beginPath(); ctx.arc(boss.x, boss.y, 35, 0, Math.PI*2); ctx.fill();
        document.getElementById('hp-bar').style.width = (boss.hp / boss.maxHp * 100) + "%";
    }

    // 弾
    ctx.fillStyle = '#0ff'; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));
    enemyBullets.forEach(b => { ctx.fillStyle = b.c; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
    enemies.forEach(e => { ctx.fillStyle = '#f33'; ctx.fillRect(e.x-12, e.y-12, 24, 24); });

    // 星形アイテム
    items.forEach(it => {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        for(let i=0; i<5; i++){
            ctx.lineTo(it.x + Math.cos((18+i*72)/180*Math.PI)*12, it.y - Math.sin((18+i*72)/180*Math.PI)*12);
            ctx.lineTo(it.x + Math.cos((54+i*72)/180*Math.PI)*6, it.y - Math.sin((54+i*72)/180*Math.PI)*6);
        }
        ctx.fill();
    });

    // ボムエフェクト
    if(bombActiveTimer > 0) {
        ctx.strokeStyle = `rgba(100, 255, 100, ${bombActiveTimer/180})`;
        ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(player.x, player.y, 600 * (1 - bombActiveTimer/180), 0, Math.PI*2); ctx.stroke();
    }
}

// 初期化
updateLivesUI();
loop();
</script>
</body>
</html>
