<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>幻想終局 ～ Phantasmagoria of 50 Stages</title>
    <style>
        body { background: #000; color: #fff; font-family: 'MS Gothic', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 4px double #888; background: #000210; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; pointer-events: none; }
        .hp-bar { width: 100%; height: 8px; background: #222; border: 1px solid #fff; margin-bottom: 5px; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.1s; }
        .stats { display: flex; justify-content: space-between; }
        #lives { color: #ff69b4; font-size: 26px; text-shadow: 0 0 5px #fff; }
        .bomb-info { color: #0f0; font-weight: bold; font-size: 14px; text-align: right; }
        #spell-name { color: #f0f; font-weight: bold; text-align: center; font-size: 20px; text-shadow: 0 0 10px #fff; margin-top: 10px; min-height: 1.2em; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .menu-item { font-size: 28px; color: #fff; border: 2px solid #fff; padding: 10px 40px; background: rgba(255,255,255,0.1); }
        .menu-item.active { border-color: #0ff; color: #0ff; box-shadow: 0 0 15px #0ff; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div class="stats">
            <div id="lives"></div>
            <div class="bomb-info">
                BOMB: <span id="bomb-val">3</span>/3<br>
                STAGE: <span id="stage-val">1</span>/50<br>
                SCORE: <span id="score-val">0</span>
            </div>
        </div>
        <div id="spell-name"></div>
    </div>
    <div id="overlay">
        <h1 id="pause-text">PAUSE</h1>
        <div class="menu-item active" id="resume-btn">▶ 再開 (Z / Enter)</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/** * ZUN-Style Sound Engine 
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.15; masterGain.connect(audioCtx.destination);

function playSound(freq, type, dur, vol, slide = 0) {
    try {
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}

function playBGM(stg, frame) {
    if (frame % 8 !== 0) return;
    const baseFreqs = [220, 261, 293, 329, 392, 440];
    const stgSeed = Math.floor((stg-1) / 5);
    const freq = baseFreqs[(frame/8 + stgSeed) % baseFreqs.length] * (stg > 25 ? 1.5 : 1);
    
    if (frame % 16 === 0) playSound(freq, 'sawtooth', 0.4, 0.08, 10); // ZUNペット
    if (frame % 8 === 0) playSound(freq * 2, 'sine', 0.2, 0.1);     // ピアノ
    if (frame % 32 === 0) playSound(freq / 2, 'square', 0.6, 0.15);  // ベース
}

/** * Game Logic
 */
const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
canvas.width = 500; canvas.height = 750;

let stage = 1, lives = 3, bombs = 3, score = 0, frames = 0;
let isSpell = false, isPaused = false, isGameOver = false, invul = 0, bombTimer = 0;
let transitioning = false;

const player = { x: 250, y: 650, r: 2 };
const boss = { x: 250, y: 150, hp: 5000, maxHp: 5000 };
let eBullets = [], pBullets = [], enemies = [], items = [];

const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.code === 'Escape' && !isGameOver && !transitioning) togglePause();
    if (isPaused && (e.code === 'KeyZ' || e.code === 'Enter')) togglePause();
    if (e.code === 'KeyX' && bombs > 0 && !isPaused && !invul && !transitioning) startBomb();
};
window.onkeyup = (e) => keys[e.code] = false;

function togglePause() {
    isPaused = !isPaused;
    document.getElementById("overlay").style.display = isPaused ? "flex" : "none";
}

function startBomb() {
    bombs--; invul = 200; bombTimer = 200; eBullets = [];
    playSound(60, 'sawtooth', 2, 0.8, 10); updateUI();
}

function updateUI() {
    document.getElementById("lives").innerText = "★".repeat(Math.max(0, lives));
    document.getElementById("bomb-val").innerText = bombs;
    document.getElementById("stage-val").innerText = stage;
    document.getElementById("score-val").innerText = score;
    const currentMax = isSpell ? boss.maxHp * 2 : boss.maxHp;
    const hpRatio = (boss.hp / currentMax) * 100;
    document.getElementById("hp-fill").style.width = Math.max(0, hpRatio) + "%";
}

function createBullet(x, y, angle, speed, color, r, snipe = false) {
    let vx = Math.cos(angle) * speed, vy = Math.sin(angle) * speed;
    if (snipe) {
        const a = Math.atan2(player.y - y, player.x - x);
        vx = Math.cos(a) * speed; vy = Math.sin(a) * speed;
    }
    eBullets.push({ x, y, vx, vy, color, r });
}

function loop() {
    if (isGameOver) return;
    if (!isPaused) {
        frames++;
        if (!transitioning) playBGM(stage, frames);
        
        // ボムのダメージ
        if (bombTimer > 0) {
            bombTimer--;
            boss.hp -= (5 + stage * 0.5);
            eBullets = []; 
        }

        // 自機移動
        let s = keys['ShiftLeft'] ? 2.5 : 6;
        if (keys['ArrowUp'] && player.y > 30) player.y -= s;
        if (keys['ArrowDown'] && player.y < canvas.height - 30) player.y += s;
        if (keys['ArrowLeft'] && player.x > 30) player.x -= s;
        if (keys['ArrowRight'] && player.x < canvas.width - 30) player.x += s;

        // ショット
        if (keys['KeyZ'] && frames % 5 === 0) {
            pBullets.push({ x: player.x, y: player.y - 20 });
            playSound(1100, 'square', 0.05, 0.02);
        }

        // 雑魚敵生成
        if (frames % Math.max(30, 120 - stage) === 0 && !isSpell && !transitioning) {
            enemies.push({ x: Math.random() * 400 + 50, y: -50, hp: 30 + stage * 5, t: 0 });
        }

        // 当たり判定更新
        pBullets.forEach((b, i) => {
            b.y -= 15;
            if (Math.hypot(b.x - boss.x, b.y - boss.y) < 40) { boss.hp -= 20; pBullets.splice(i, 1); score += 10; }
            enemies.forEach((e, ei) => {
                if (Math.hypot(b.x - e.x, b.y - e.y) < 30) {
                    e.hp -= 20; pBullets.splice(i, 1);
                    if (e.hp <= 0) {
                        items.push({ x: e.x, y: e.y });
                        enemies.splice(ei, 1);
                        score += 50;
                    }
                }
            });
            if (b.y < 0) pBullets.splice(i, 1);
        });

        if (invul > 0) invul--;

        eBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            if (!invul && Math.hypot(b.x - player.x, b.y - player.y) < b.r + player.r) {
                lives--; playSound(150, 'sawtooth', 0.6, 0.5, 50);
                if (lives < 0) { isGameOver = true; alert("満身創痍 - 最終スコア: " + score); location.reload(); }
                else { invul = 150; player.x = 250; player.y = 650; eBullets = []; updateUI(); }
            }
            if (b.y > 800 || b.y < -50 || b.x < -50 || b.x > 550) eBullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.y += 2.5; e.x += Math.sin(e.t += 0.04) * 5;
            // 雑魚弾幕 (ステージ弾幕より少なめ)
            if (frames % 50 === 0) createBullet(e.x, e.y, 0, 3 + stage*0.1, "#f44", 4, true);
            if (!invul && Math.hypot(e.x - player.x, e.y - player.y) < 25) {
                lives--; enemies.splice(i, 1); updateUI();
            }
            if (e.y > 800) enemies.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.y += 3;
            if (Math.hypot(it.x - player.x, it.y - player.y) < 40) {
                lives++; playSound(1200, 'sine', 0.2, 0.2); items.splice(i, 1); updateUI();
            }
            if (it.y > 800) items.splice(i, 1);
        });

        // ボス弾幕
        if (!transitioning) {
            const diff = 1 + (stage * 0.15);
            if (!isSpell) {
                if (frames % Math.max(2, 15 - Math.floor(stage/5)) === 0) createBullet(boss.x, boss.y, 0, 3 * diff, "#fff", 5, true);
                if (frames % 50 === 0) {
                    let count = 8 + Math.floor(stage/3);
                    for(let i=0; i<count; i++) createBullet(boss.x, boss.y, i*Math.PI*2/count + frames*0.02, 2*diff, "#0ff", 4);
                }
            } else {
                document.getElementById("spell-name").innerText = stage % 5 === 0 ? "★超神速「" + spellCards[stage-1] + "」" : "「" + spellCards[stage-1] + "」";
                if (frames % 3 === 0) createBullet(boss.x, boss.y, frames * 0.2, 2.5 * diff, "#f0f", 3);
                if (frames % 40 === 0) {
                    let count = 12 + Math.floor(stage/2);
                    for(let i=0; i<count; i++) createBullet(boss.x, boss.y, i*Math.PI*2/count, 4, "#ff0", 6, true);
                }
            }
        }

        // フェーズ管理
        if (boss.hp <= 0 && !transitioning) {
            if (!isSpell) {
                isSpell = true; boss.hp = boss.maxHp * 2;
                eBullets = []; playSound(1200, 'sine', 1, 0.3);
            } else {
                if (stage === 50) { isGameOver = true; alert("全50ステージ制覇！あなたは伝説の現人神です！"); location.reload(); }
                else {
                    transitioning = true;
                    setTimeout(() => {
                        stage++; bombs = 3; isSpell = false; 
                        boss.maxHp = 5000 + stage * 500; boss.hp = boss.maxHp;
                        eBullets = []; enemies = []; items = []; transitioning = false;
                        document.getElementById("spell-name").innerText = ""; updateUI();
                    }, 2000);
                }
            }
        }
        boss.x = 250 + Math.sin(frames * 0.02) * 160;
        updateUI();
    }

    // 描画
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bombTimer > 0) {
        ctx.fillStyle = `rgba(100, 255, 100, ${bombTimer/200})`;
        ctx.fillRect(0,0,500,750);
    }
    // 自機
    if (invul % 4 < 2) {
        ctx.fillStyle = "#0df"; ctx.beginPath(); ctx.arc(player.x, player.y, 12, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 2, 0, 7); ctx.fill();
    }
    // 敵
    ctx.strokeStyle = isSpell ? "#f0f" : "#fff"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(boss.x, boss.y, 35, 0, 7); ctx.stroke();
    enemies.forEach(e => { ctx.fillStyle = "#f44"; ctx.beginPath(); ctx.arc(e.x, e.y, 18, 0, 7); ctx.fill(); });
    // 星アイテム
    items.forEach(it => { ctx.fillStyle = "#ff0"; ctx.font = "24px serif"; ctx.fillText("★", it.x-10, it.y); });
    // 弾
    ctx.fillStyle = "#fff"; pBullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));
    eBullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill(); });

    requestAnimationFrame(loop);
}

const spellCards = Array.from({length: 50}, (_, i) => `幻想弾幕 第${i+1}番`);
updateUI(); loop();
</script>
</body>
</html>
